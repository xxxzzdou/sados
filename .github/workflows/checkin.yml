name: Glados Auto Checkin

on:
  # 每天北京时间 8:00 自动运行 (UTC 0:00)
  schedule:
    - cron: '0 0 * * *'
  
  # 允许手动触发（随时可以点按钮运行）
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4
    
    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'  # 现在有requirements.txt了，缓存可以正常工作
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt  # 从requirements.txt安装依赖
    
    - name: 执行签到脚本
      env:
        GLADOS_COOKIES: ${{ secrets.GLADOS_COOKIES }}
        SERVERCHAN_SCKEY: ${{ secrets.SERVERCHAN_SCKEY }}
      run: python glados_checkin.py
