name: Glados Auto Checkin

on:
  # 每天北京时间 8:00 自动运行 (UTC 0:00)
  schedule:
    - cron: '0 0 * * *'
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Run checkin script
      env:
        GLADOS_COOKIES: ${{ secrets.GLADOS_COOKIES }}
        SERVERCHAN_SCKEY: ${{ secrets.SERVERCHAN_SCKEY }}
      run: python glados_checkin.py
